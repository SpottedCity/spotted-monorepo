services:
  db:
    image: postgis/postgis
    container_name: spotted-backend-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: spotted_city
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: